name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # Allow manual trigger from GitHub UI

# Allow one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Build
  # ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint (optional — remove if no ESLint config)
        run: npm run lint --if-present

      - name: Build production bundle
        run: npm run build
        env:
          # Supabase — add these in GitHub → Settings → Secrets → Actions
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:    ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # ElevenLabs (optional)
          VITE_ELEVENLABS_API_KEY:   ${{ secrets.VITE_ELEVENLABS_API_KEY }}
          VITE_ELEVENLABS_VOICE_ID:  ${{ secrets.VITE_ELEVENLABS_VOICE_ID }}
          # Override repo name for correct GitHub Pages base path
          # Set this secret to your repo name, e.g. "clawbot-mission-control"
          VITE_REPO_NAME:            ${{ secrets.VITE_REPO_NAME }}

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ──────────────────────────────────────────────────────────
  # 2. Deploy
  # ──────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
